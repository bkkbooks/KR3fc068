body:
  text: 三率開方而得二率即為通弧之數正矢求弧背則比例固同而所用二乘矢數乃弧倍作弧分自乘數與通弧作弧分自乘數亦為一與四弧倍求矢本以弧背自乘二除為矢三率則二乘矢即如弧背自乘數通弧加弧背一倍則積亦四倍以求諸率當加一四乘今不復加而亦各以少一四除代之也如以前乘除降位之理釋之則弦求弧所用之弦即弧求弦所得諸率為二率幾少四率幾多六率幾舉以見例故不及八率以下諸率即為第二率亦即為第一數如求六率當以第一數內之二率自乘為第三率內之三率第一數內之二率乘第一數內之四率二乘之為第三率內所少之五率本以第一數二率幾少四率幾字乘則二率乘二率為三率即如二率自乘二率乘四率四率乘二率兩數相并為五率即如二率
