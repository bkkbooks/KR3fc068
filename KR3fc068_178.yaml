body:
  text: 積亦以六率為高而廣則如弧分五乘減一折半長則如弧分五乘減一折半又加一弧求弦之帶縱立方積其高為弧求弦之六率以除帶縱立方積則的長廣相乘之冪其分廣一長六其冪六九分廣二長七其冪十四其廣起七分為一七分以下弧分皆遞增二廣長數皆遞增一故以弧分減五折半為廣加五為長弦求弧之帶縱立方積以弦求弧之六率為高以除帶縱立方積則三分冪為五十六廣如七長如八五分冪為一百五十六廣如十二長如十三七分冪為三百有六廣如十七長如十八其廣起三分為七三分以下弧分皆遞增二廣數皆遞增五其長較廣亦多一則亦遞增五故以弧分五乘減一折半為廣廣恆加一為長以此類推則十率以弧分七乘減一折半為廣加一為長十二率以弧分九乘減一折半為廣加一為長法皆一貫則以此長廣相乘為帶縱平方冪六率乘之為帶縱立方積六除之七除之可得八率而所有之帶縱立方積為弧分自乘又二十五乘減一六率乘之所乘磬折立方積四之一
