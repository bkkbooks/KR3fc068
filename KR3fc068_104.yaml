body:
  text: 六乘三角堆積相加即得八率一前空位無加仍得一為七分弧之八率一八相加得九為九分弧之八率入三十六相加得四十四為十一分弧之八率凡率數進一則三角堆乘方數亦進一而求弦矢各率者皆可以三角堆求積數御之矣凡求三角堆積皆以根數根數即層數與根數加一相乘為帶縱平方積二除之得平三角堆積以根數與根數加一相乘加二再乘為帶縱立方積二除之三除之得立三角堆積以根數與根數加一相乘加二再乘加三三乘為帶縱三乘方積二除之三除之四除之得三乘三角堆積以根數與根數加一相乘加二再乘加三三乘加四四乘為帶縱四乘方積二除之三除之四除之五
