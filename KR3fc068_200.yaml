body:
  text: 如圖甲丙為弧分甲乙丙丁為弧分自乘正方形甲己為三倍弧分甲戊己庚為三倍弧分自乘正方形即甲乙丙丁方形之九倍辛子己癸小方隅積四其邊辛己為二以甲己減辛己折半於丑為三倍弧分減二折半之數丑寅為三倍弧分減二折半又加二之數丑寅同丑己丑寅辛壬帶縱平方冪為甲戊辛子癸庚磬折冪四之一若同以七率為高則立積為四之一矣十一率以下數遞進而二位乘除則無異則十一率以四倍弧分減二折半為廣加二為長之面冪與十六倍弧分自乘方又減四之磬折冪十三率以五倍弧分減二折半為廣加二為長之面冪與二十五倍弧分自乘
  hash: sha256:9d643428eea3c41d2a65fd3269100a53aa156b5968ee8e05a15e84274a01dd1f
