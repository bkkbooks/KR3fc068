body:
  text: 三倍二率自乘數少三以除數相異之四與五迭乘之二與三迭除之得十倍二率自乘數少十為長以後形之長二率自乘數少九減之得九倍二率自乘數少一為長仍以二率為廣二率自乘數少一為高以此立方積四除之二除之三除之又四除之又四除之五除之即為弦求弧應加之六率而二率為廣二率自乘數少一為高相乘之高廣冪四除之二除之三除之即第二數內之四率則用四率之數即如用高廣相乘四除之二除之三除之之數故惟以二率自乘九乘減一四率乘之四除之又四除之五除之而得應加之六率也矢求弧所用之矢即弧求矢所得諸率為三率幾少五率
