body:
  text: 三乘數乘之四除之又七除之八除之為第四數以諸數相并及所求矢單位以下棄之未至單位者依次求之右四術為立法之原杜氏九術由此推演而歸於簡易蓋弧與弦矢相求皆弧與一分之弦合故即以弧數為弧之分數則一分之數極微減差亦極微可以不計而其所用之三率已藏一自乘數故不更求乘數今所立弦矢相求術則弧不與弦合析分愈少則弧弦差愈多必當如減差以求乘數而三率內不復更藏自乘數方為密合又以正弦求正弦則如通弦術而每數內各省一四除正矢求正矢則矢數弧分並同故不復
  hash: sha256:e0bf25db32bc1d2fe1377b2737efe8158f45760d303c6dc858f7d22089a3f795
