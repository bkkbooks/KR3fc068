body:
  text: 之四率本以二率自乘減一又二率乘之四廚之二除之三除之得四率今即以二率為用如求四率法乘除之又本當以二率除今於二率自乘減一下省一二率以代之餘可類推即第二數內所少之六率復以二率字成減一二率乘之又以二率自乘減九乘之四除之二除之三除之又四除之又四除之五除之此即弧求弦六率之法即第一數內六率法當相減今以兩數俱為立方積則一以二率為廣二率自乘數少一為高三倍二率自乘數少三為長一以二率為廣二率自乘數少一為高二率自乘數少九為長兩形高廣既同則以長數相減為長以原高廣為立方形必與兩體積相減等然兩積之中除數各異當更變齊長使除術相同而後可通為一以先減而後除故置前形之長
