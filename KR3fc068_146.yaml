body:
  text: 為高則成寅甲乙丁未午申子丑卯磬折立方形兩立積相較亦為四之一矣七率以下數遞進而按位乘除則無異可以類推不復圖解則凡有通弧以求弦矢諸率即以通弧作弧分為二率其求弦率者弧分自乘減一二率乘之四除之又二除之三除之為四率弧分自乘減九四率乘之四除之又四除之五除之為六率弧分自乘減二十五六率乘之四除之又六除之七除之為八率弧分自乘減四十九八率乘之四除之又八除之九除之為十率以次遞求其減數皆奇數案未自乘數其求史率者弧分自乘四除之又二除之為三率弧分自乘減四三率乘之
