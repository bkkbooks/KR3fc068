body:
  text: 相乘與根加一再乘得數兩術相并為兩帶縱立方積二除之三除之為兩立三角堆積乃得四率置弧分減二折半五率一起於四分如三乘三角堆根數之為一者則六分根為二八分根為三矢起於弧之二分而三乘三角堆根則起於弧之四分故當減二折半為三乘三角堆之根以根與根加一相乘與根加二再乘與根加三三乘得數又以根減一與根相乘與根加一再乘與根加二三乘得數兩數相并為兩帶縱三乘方積二除之三除之四除之為兩三乘三角堆積乃得五率置弧分減三折半六率一起於五分如四乘三角堆根數之為一者則七分根為二九分根為三弦起於弧之一分而四乘三角堆根則起於弧之五分故當減三折半為四乘三角堆之根以根與根加一相乘與根加二再乘與根加三三乘與根加四四乘得
