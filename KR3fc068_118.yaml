body:
  text: 數凡求方錐堆積皆以倍根數乘根數為帶縱平方積二除之得平方錐堆積以根數與根數加一相乘倍根數加一再乘為帶縱立方積二除之三除之得立方錐堆積以根數與根數加一相乘根數加二再乘倍根數加二三乘為帶縱三乘方積二除之三除之四除之得三乘方錐堆積以根數與根數加一相乘根數加二再乘根數加三三乘倍根數加三四成為帶縱四成方積二除之三除之四除之五除之得四成方錐堆積乘除數皆遞進一與三角堆同惟倍根數亦遞加一為異此亦堆垛術之定法也舊法惟有立方錐堆求積術其術以根數加半相乘故為用三除此用倍根加一則倍於根數加半故又增一二除諸乘方理數悉同可以類推凡求弦求矢皆
