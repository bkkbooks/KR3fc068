body:
  text: 省四除法雖小異而理實相同也遞求之次愈多則得數愈密故單位下仍宜加小餘數位葢畸零絫積尾數易差耳舊法求弦矢以立八線表取數紆迴五分之弦則用中比例後更增求三分之一通弦術用益實歸除汪氏萊更補求五分之一通弦術商除進惟通弦在半徑以上矢及正弦在半徑二之一以上者當求得半弧之弦矢求之數大者右半之故以六十度之弦矢順次遞求一象限內之弦矢悉得其乘除之術並有定程無煩詳審句股割圜之術葢愈精而愈簡矣
