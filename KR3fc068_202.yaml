body:
  text: 方又減四之磬折冪皆為四之一至億萬率無不相同故以八乘矢為三率即為弧分自乘數弦求弧通弦之二率本與弧分同故即以通弦自乘為弧分自乘以求諸率矢求弧則本無弧分數而弧求矢術本以弧分自乘四除二即八除為矢三率則即用八乘矢為弧分自乘數以求諸率也置弧分自乘數減四三率乘之四除之又三除之四除之為五率置弧分自乘數四乘之減四五率乘之四除之又五除之六除之為七率置弧分自乘數九乘之減四七率乘之四除之又七除之八除之為九率以此遞求其乘數皆遞加自乘數其減數皆為四而除數則與弧求矢同其一率遞除降位及直以三率乘之不復減四其理亦同既得諸率以之相加即得三率全數弧分既同二率則以一率乘
