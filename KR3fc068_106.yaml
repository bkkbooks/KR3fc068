body:
  text: 除之得四乘三角堆積乘方數進一位則乘數皆增一除數亦增一此堆垛術之定法也舊法至求立三角堆而止三乘方以下見汪來衡齊算學據此術以求弦矢諸率當置弧分折半三率一起於二分如平三角堆根數之為一者則四分根為二六分根為三凡三角堆根數皆遞加以一而弧分皆遞加以二矢起於弧之二分而平三角堆根亦起於弧之二分故當折半為平三角堆之根以根與根加一相乘得數又以根減一與根相乘得數兩數相并兩三角積除數相同以實相并而并除為兩帶縱平方積二除之為兩平三角堆積乃得三率置弧分減一折半四率一起於三分如立三角堆根數之為一者則五分根為二七分根為三凡三角堆根數皆遞加以一兒弧分皆遞加以二弦起於弧之一分而立三角堆根則起於弧之三分故當減一折半為立三角堆之根以根與根加一相乘與根加二再乘得數又以根減一與根
