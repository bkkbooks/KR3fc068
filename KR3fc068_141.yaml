body:
  text: 數本以弧分減二折半為根數故甲丙減丑丙折半於庚為庚丑庚壬為根加二以庚丑為廣庚壬為長三率為高成帶縱立方積本以根與根加二相乘以三率再乘為帶縱立方積其面冪為庚壬丑癸帶縱平方形為甲乙丑子申丁磬折面冪四之一移積之理並與前同若同以甲寅三率為高則成寅甲乙丁未午申子丑卯磬折立方形兩立積相較亦為四之一矣凡求六率所得之帶縱立方積以根數為廣根數加三為長四率為高與弧自分乘減九為面冪四率為高之磬折立方積為一與四故置弧分自乘減九為磬折面冪以四率乘之為磬折立方積四除之得帶縱立方積又四除之五除之得四乘方錐堆積即為六率
