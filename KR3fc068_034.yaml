body:
  text: 半徑除之得五率倍之與左相減即原所求矢如過全徑以上者三歸之如法求得矢九乘之寄左復以矢倍之為三率三率自乘一率半徑除之得五率三乘之與左相減復以三率乘五率一率半徑除之得七率折半與左相加即原所求矢弧背求正弦正矢弧背過四十五度者則以減象限如法求得正矢以減半徑為正弦如法求得正弦以減半徑為正矢通弦求弧視通弦過半徑以上而在半徑十之十七以下者求得矢倍之半徑成之開方得通弦如通弦術求得通弧倍之為所求通弧如在十之十七以上者通弦自乘以減全徑自乘開方得通弦如通弦術求
