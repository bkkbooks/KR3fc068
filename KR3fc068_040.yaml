body:
  text: 借弧相加減本弧正弦大於借弧正弦則加小則減得本弧蓋即二簡法中相加相減之術也附以弦求弦以矢求矢術有通弦求通弧加倍幾分知通弦凡弦之倍分皆取奇數術曰置弧分自乘減一為第一乘數復置自乘數減九為第二乘數復置自乘數減二十五為第三乘數依次列之乃置弧分乘通弦本數為第一數寄左次以半徑為連比例第一率通弦本數為第二率二率自乘一率除之得第三率以第一數乘之一率除之得第四率第一乘數乘之四除之又二除之三除之為第二數寄右次置第二數以三率乘之一率除之得第六率第二乘
