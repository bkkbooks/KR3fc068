body:
  text: 四五六上圖遞加之數即三角堆每層遞加之根數三角堆一層則根為一二層則根為二諸形態同亦即平三角堆每層之數也平三角堆第一層為一第二層為二第三層為三第三列為一三六十十五二十一上圖遞加一次相并之數即平三角堆之積平三角堆根一者為基一根二者并一層一二層二為積三根三者并一層一二層二三層為積六亦即立三角堆每層之數也立三角堆第一層為一第二層三第三層為六第四列為一四十二十三十五上圖遞加二次相并之述即立三角堆之積立三角堆根一者為積一根二者并一層一二層三為積四根三者并一層一二層三三層六為積十亦即三乘三角堆每層之數也三乘三角堆第一層為一第二層為四第三層為十第五列為一五十五三十五七十上圖遞加三次相并之數即三乘三角堆之積三乘三角堆根一者為積一根二者
