body:
  text: 幾多七率幾即為第三率亦即為第一數如求七率當以第一數內之三率自乘為遞五率內之五率第一數內之三率乘第一數內之五率二乘之為遞五率內所少之七率各以第一數內之五率乘之三率自乘除之則第一數內所少之五率即第二數內所有之五率第一數內五率自乘二乘之三率除之為第二數內所少之七率當以第一數內所多之七率減之方為矢求弧應加之七率而第一數內諸率皆出於三率而三率又為二率自乘八除之數如亦以二率齊之則置二率自乘以二率自乘減四乘之又以二率自乘減四乘之又二乘之四除之二除之又四除之三除之四除之又四
