body:
  text: 有通弦求己分通弧之一通弦此亦取奇數術曰置弧分自乘減一為第一乘數復置自乘數九乘之減一為第二乘數復置自乘數二十五乘之減一為第三乘數一次列之乃置通弦本數以弧分除之為第一數次以半徑為連比例第一率弧分除通弦為第二率二率自乘一率除之得第三率二率乘之一率除之得第四率第一乘數乘之四除之又二除之三除之為第二數次置第二數以三率乘之一率除之得第六率第二乘數乘之四除之又四除之五除之為第三數次置第三數以三率乘之一率除之得第八率第三乘數成之四除之又六除之七除之為第四數以諸數相并
