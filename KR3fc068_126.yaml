body:
  text: 本以弧分減一折半為根其立方面冪為根乘根加一之冪則根為廣根加一為長其常廣和為倍根加一與弧分等五率本以弧分減二折半為根其立方面冪為根乘根加二之冪則根為廣根加二為長其長廣合為倍根加二亦與弧分等以下並同凡以長廣和為正方減去較方冪恆為原方冪之四倍又兩立方體同高者其面冪之比例即如體積之比例此又通弧求弦矢各加一四除之理所從出也凡求三率所得之帶縱平方積以根數為廣倍根數為長如以諸率相連之理例之則亦可以一率為高成立方體葢一率常為一故立積亦如平積也與弧分自乘平方積如一與二故置弧分自乘為平方積二除之得帶縱平方積又二除之得平方錐堆積即為三率然諸數皆用倍矢此求矢本數當更以二除之方為
