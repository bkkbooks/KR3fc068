body:
  text: 由二率以求諸率而倍根遞加數又恒與弧分等即恒與二率等如三率則以倍根數相乘而根數即由弧分折半而得是弧分即倍根四率本以倍根數加一相乘而根數即由弧分減一折半所得是弧分即倍根加一以此遞推則弧分與倍根遞加數常相等則設有二率以求諸率者弧分二率折半為根以乘弧分二率即倍根得帶縱平方積二除之得平方錐堆積即為三率復已弧分減一折半為根以根與根加一相乘以乘弧分二率即倍根加一為帶縱立方積二除之三除之得立方錐堆積即為四率復以弧分減二折半為根以根與根加二相乘以乘三率為帶縱立方積三除之四除之得三乘方錐堆積即為五率凡二率與四率三率與五率根皆遞降以一本當以根與根加一相乘根加二再乘倍根加二三乘為帶縱三乘方積二除之三除之四除之得三乘方
