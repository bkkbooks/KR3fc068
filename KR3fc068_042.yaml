body:
  text: 數乘之四除之又四除之五除之為第三數寄左次置第三數以三率乘之一率除之得第八率第三乘數乘之四除之又六除之七除之為第四數寄右第一數與第三數相并第二數與第四數相并左右相減即所求通弦單位以下棄之未至單位者依次求之雖未至單位如減數適足弧分自乘數而無乘數者即以前所得數并減之不復遞求如三倍弧則無第三數五倍弧則無第五數有矢求通弧加倍幾分之矢凡矢之倍分奇耦通用術曰置弧分自乘四倍之減四為第一乘數復置四倍字乘數減十六為第二乘數復置四倍自乘數減三十六為第三乘數依次列之乃置弧分自乘數乘矢本數
  hash: sha256:d4e6bbccc05e4260052a07dd7a3bbd6ef8ba1a03f6f364a6ab0a1b14201508df
