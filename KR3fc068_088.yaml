body:
  text: 如圖舉六率以上為例第一列皆為一遞加數之根數也一二三四五遞加數皆遞加一第二列一二三四諸數加數也第三列一三六十諸數遞加數相并之數也一仍為一一又加二為三三又加三為六六又加四為十第四列一四十二十諸數遞加數二次相并之數也一仍為一一又加三為四四又加六為十十又加十為二十第五列一五十五三十五諸數遞加數三次相并之數也一仍為一一又加四為五五又加十為十五十五又加二十為三十五第六列一六二十一五十六諸數遞加數四次相并之數也一仍為一一又加五為六六又加十五為二十一二十一又加三十五為五十六以此遞加至數十百次相并皆起
  hash: sha256:6c5e0ec753a1c661e2036cc364a6721940880ccc6f70050ffc650d448456c4bb
