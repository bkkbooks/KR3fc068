body:
  text: 并一層一二層似為積五根三者并一層一二層四三層十為積十五亦即四乘三角堆每層之數也四乘三角堆第一層為一第二層為五第三層為十五以此遞推至數十百乘三角堆積皆以次漸層而其根常相等如根為二則平三角堆積三立三角堆積四三乘三角堆積五四乘三角堆積六五乘三角堆積七六乘三角堆積八根為三則平三角堆積六立三角堆積十三乘三角堆積十五四乘三角堆積二十一五乘三角堆積二十八六乘三角堆積三十六如前圖以倍遞加數加一數為弦之二率在此則為倍第二列平三角堆每層數加第一列三角堆根遞加差數而三角堆根遞加差數即平三角堆每層數之差是依次兩平三角堆每層數相加即得二率一前空位無加仍得一為一分弧之二率一二相加得三為三分弧之二率二三相加得五為五分弧之二率上圖以倍遞加一次相并數加遞加數為矢之三率在此
