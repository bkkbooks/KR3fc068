body:
  text: 即所求通弦單位以下棄之未至單位者依次求之有矢求幾分通弧之一矢此亦奇耦通用術曰置弧分自乘四倍之減四為第一乘數復置四倍自乘數四乘之減四為第二乘數復置四倍自乘數九乘之減四為第三乘數依次列之乃置弧分自乘數除矢本數為第一數次以半徑為連比例第一率弧分自乘數除矢本數又二乘之為第三率矣第一數乘之一率除之得第五率第一乘數乘之四除之又三除之四除之為第二數次置第二數以三率乘之一率除之得第七率第二乘數乘之四除之又五除之六除之為第三數次置第三數以三率乘之一率除之得第九率第
