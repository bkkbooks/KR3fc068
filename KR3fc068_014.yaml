body:
  text: 右相減所餘即矢第四術弧背求正弦術曰以弧背為第一數寄左次以半徑為連比例第一率弧背為第二率二率自成一率除之得第三率次置第一數以三率乘之一率除之得第四率二除之三除之為第二術應減寄右次置第二數以三率乘之一率除之得第六率四除之五除之為第三數應加寄左次置第三數以三率乘之一率除之得第八率六除之七除之為第四數應減寄右第一數第三數相并第二數第四數相并左右相減所餘即正弦
