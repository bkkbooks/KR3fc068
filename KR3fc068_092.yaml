body:
  text: 三率一水斗三率二坤兌三率三巺離三率四倍矢上下一端之三率為一三六十如遞加相并數丁水三率一戊坤三率三己巺三率六庚箕三率十弦左右一端之四率同水火四率一斗亢四率三兌角四率六離尾四率十率數遞降而遞加相并數亦遞增而二率起一分三率起二分四率起三分五率起四分皆遞差一位弦矢中一分與兩端之一既並如遞加相并數則即以遞加相并數按層斜列之倍下一列數加上一列數即可按次而得弦矢諸率夫遞加相并諸數即三角堆諸數也故又以三角堆之數變之弦矢連比例諸率成三角堆圖
