body:
  text: 方出於矩矩出於九九八十一圜弧也方弦矢也九九八十一遞加遞減遞乘遞除之差也方圜者天地之大體奇耦相生出於自然今得此術而方圜之率通矣爰分圖著解冠以九術原文並立弦矢互求四術都為三卷辭取易明有傷蕪冗其所未寤俟有道正焉嘉慶二十四年夏四月陽湖董祐誠
