body:
  text: 則為倍第三列平三角堆積加第二列平三角堆每層數而平三角堆每層數即平三角堆積之差市一次兩平三角堆積相加即得三率一前空位無加仍得一為二分弧之三率一三相加得四為四分弧之三率三六相加得九為六分弧之三率以此遞推則依次兩立三角堆積相加即得四率一前空位無加仍得一為三分弧之四率一四相加得五為五分弧之四率四十相加得十四為七分弧之四率一次兩三乘三角堆積相加即得五率一前空位無加仍得一為四分弧之五率一五相加得六為六分弧之五率五十五相加得二十為八分弧之五率一次兩四乘三角堆積相加即得六率一前空位無加仍得一為五分弧之六率一六相加得七為七分弧之六率六二十一相加得二十七為九分弧之六率依次兩五乘三角堆積相加即得七率一前空位無加仍得一為六分弧之七率一七相加得八為八分弧之七率七二十八相加得三十五為十分弧之七率依次兩
