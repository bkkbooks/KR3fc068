body:
  text: 割圜解既成之二年朱先生復得割圜冪率捷法四卷於鍾祥李氏蓋乾隆初欽天監監正明圖所解而門人陳際新所續成者其書釋連比例諸率分弦矢為二術皆先設百分千分萬分諸弧如本法乘除之棄其畸零以求合於矢之十二三十五十六弦之二十四八十百六十八諸數遂謂遞加一數以為除法者特去其易知使弧矢奇耦率可互通鉤隱探賾雜而不越蓋師弟相承積三十餘年之久推其用心可謂勤且深矣陳氏序言圜徑求周及弧求弦矢三術為杜德美氏所作餘六術則明圖氏補之與張先生所傳互異又借弧借弦二
  hash: sha256:6a533bdd7656fbca49e8afb4ec466650e80f34955f88aa2453f38f01ffaaac13
