body:
  text: 次遞降在矢則微己三率少幾五率又少幾七率又少幾九率亦以次遞降數見下遞加諸率在弧求弦矢則以弧分加一得最末率三分加一為四則弦末位為四率四分加一為五則矢末位為五率在弦矢求弧則三分以下已無盡數然析圜至億萬分設數雖大而數十率以後已不成分秒故自單位以下直棄其餘不復入算既得諸率以堆垛術御之則序次秩然而弦則有二率本數即可求二率本數矢則有二率以求三率即可求三率以下諸率之兼數有三率以下諸率之兼數亦可求三率以得二率本數二率既常與弧分等則有弧可求弦矢有弦矢亦可求弧故弦則自一分至億萬分矢則自二分至億萬
