body:
  text: 如圖甲丙為弧分甲乙丙丁為弧分自乘正方形甲己為二倍弧分甲戊己庚為二倍弧分自乘正方形即甲乙丙丁方形之四倍辛子己癸小方隅積四其邊辛己為二以甲己減辛己折半於丑丑辛為二倍弧分減二折半之數丑寅為二倍弧分減二折半又加二之數丑寅同丑己丑寅辛壬帶縱平方冪為甲戊辛子癸庚磬折冪
