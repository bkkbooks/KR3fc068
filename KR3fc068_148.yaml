body:
  text: 四除之又三除之四除之為五率弧分自乘減十六五率乘之四除之又五除之六除之為七率弧分自乘減三十六七率乘之四除之又七除之八除之為九率亦以次遞求其減數皆耦數按位自乘數然所得諸數皆諸率之約分若求真數當遞以一率除之而其位遞降因一率常微一故諸率位降而數不改又通弧求弦矢即以通弧數作弧分數則自乘後減數至微及一四九十六諸數可不入算故直以通弧為二率二率自乘為三率即如弧分自乘下求諸率並以三率乘之不復遞減也弦矢互求諸術則必以減數立算方為密合又弧求弦弧分當用奇數然其差亦微故奇耦通用至弦求弦則仍當用奇數也既得諸率按間位多少之數加減之即為通弦之全數弧背求正弦正
