body:
  text: 如圖甲乙為半徑甲丁甲庚甲壬並同乙丁弧為一分丁庚庚壬弧並同乙庚弧為二分乙壬弧為三分乙丁為一分通弦丁庚庚壬同乙壬為三分通弦丁癸為二分矢丁戊為二分倍矢丁甲乙角對乙丁弧為兩等邊形等邊必等角甲丁與甲乙等則乙丁甲角與丁乙甲角等丁乙戊角為界角與丁甲乙角等凡界角皆得心角之倍度丁乙戊三角形與丁甲乙三角形同用丁角而丁乙戊角又同丁甲乙角則丁戊乙角亦必同丁乙甲角又從丁與庚甲徑線平行做丁己線則己丁戊角必同丁甲庚角亦即同乙甲丁角及丁乙戊角而戊丁己三角形與丁乙戊三角形同用丁戊已角則丁己戊角亦必與乙丁戊角等此三三角形皆同式故甲乙與乙丁之比
  hash: sha256:4d1facbda900750fa5fe57c102658449b608d5b43cef6840c7574e2ba517cf14
