body:
  text: 為第一數寄左次以半徑為連比例第一率矢本數二乘之為第三率以第一數乘之一率除之得第五率第一乘數乘之四除之又三除之四除之為第二數寄右次置第二數以三率乘之一率除之得第七率第二乘數乘之四除之又五除之六除之為第三數寄左次置第三數以三率乘之一率除之得第九率第三乘數乘之四除之又七除之八除之為第四數寄右第一數與第三數相并第二數與第四數相并左右相減即所求矢單位以下棄之未至單位者依次求之雖未至單位如減數適足四倍弧分自乘數而無乘數者即以前所得數并減之不復遞求如二倍弧則無第三數三倍弧則無第四數
