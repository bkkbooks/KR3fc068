body:
  text: 乙如以甲乙半徑為連比例第一率則丙乙為二率為一分之弦丙乙二率自乘甲乙一率除之得丙火三率為二分之倍矢解同前圖半之得丙土三率二之一為二分之矢丙乙火角為兩等邊形乙土為其中垂線故丙土得丙火之半丙乙二率乘丙火三率甲乙一率除之得火木四率解同前圖以減水木二率水木同丁丙即同丙乙得水火二率一少四率一以加倍乙火二率乙火同丙乙亦同戊木倍乙火即同乙火并戊水得戊乙二率三少四率一為三分之弦減戊水二率得水乙二率二少四率一丙乙二率乘之甲乙一率除之水以斗三角形與乙甲丙三角形同式得水斗三率二少五率一凡二率自乘一率除之為三率二率三率相乘一率除之為四率二率四率相乘一率除之為五率位遞降而數不變下可遞推半之得水辛三率一少
  hash: sha256:e1ca8aef0d248424fe36942b41c4739cf7ea9170d8c2b63ec075d6721d3d98a4
