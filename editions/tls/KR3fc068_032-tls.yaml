body:
  text: 半周三一四一五九二六五三五八九七九三全周六二八三一八五三七一七九五八六按今八線表半徑一千萬則小餘有七位凡數皆至單位止然必更加小餘數位則得數方密除得數首位未至單位以下者依遞加諸率以次求之如所用二率過大則乘除之數愈絫愈繁別立簡法以御之通弧求弦通弧過半徑以上者三歸之如法求得通弦三乘之寄左復以通弦為連比例二率二率自乘再乘一率半徑自乘除之得四率與左相減即原所求通弦通弧求矢通弧過半徑以上者二歸之如法求得矢四乘之寄左復以矢為三率三率自乘一率
