body:
  text: 所餘即通弦第三術通弧求矢術曰以半徑為連比例第一率通弧為第二率二率自乘一率除之得第三率四除之又二除之為第一數寄左次置第一數以三率乘之一率除之得第五率四除之又三除之四除之為第二數應減寄右次置第二數以三率乘之一率除之得第七率四除之又伍除之六除之為第三數應加寄左次置第三數以三率乘之一率除之得第九率四除之又七除之八除之為第四數應減寄右地一數第三數相并第二數弟四術相并左
