body:
  text: 如圖甲丙為弧分甲乙丙丁為弧分自乘正方形丑子丙申小方隅積九其邊丑丙為三庚丑為甲丙之半即根數本以弧分減三折半為根數故甲丙減丑丙折半於庚為庚丑庚壬為根加三以庚丑為廣庚壬為長四率為高成帶縱立方積本以根與根加三相乘以四率再乘為帶縱立方積其面冪為庚壬丑癸帶縱平方形為甲乙丑子申丁磬折形面冪四之一若同以甲寅四率
