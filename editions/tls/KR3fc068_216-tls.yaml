body:
  text: 二率自乘數少四為長仍以二率自乘數為廣二率自乘數少四為高以此立方積四除之二除之又四除之三除之四除之又四除之五除之六除之即為矢求弦應加之七率而二率自乘數為廣二率自乘數少四為高相乘之高廣冪四除之二除之又四除之三除之四除之及第二數內之五率則用五率之數即如用高廣相乘四除之二除之又四除之三除之四除之之數故惟以二率字乘四乘減四五率乘之四除之五除之六除之而得應加之七率也諸數雖異其理與弦悉同其弦自八率以降矢自九率以降取數雖繁而以省乘省除通之以同乘同除合之以異乘同除齊其除數以同乘異除齊其
