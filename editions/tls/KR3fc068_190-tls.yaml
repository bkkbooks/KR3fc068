body:
  text: 矢之帶縱立方積其高為五率以除帶縱立方積則得長廣相乘之冪六分廣為一長為五其冪五八分廣為二長為六其冪十二其廣起六分為一六分以下弧分皆遞增二廣長數皆遞增一故以弧分減四折半為廣加四為長矢求弧之帶縱立方積其高亦為五率而七率既不同則體積變而面冪亦變若以五率為高除帶縱立方積則四分冪為十五廣如三長如五六分冪為三十五廣如五長如七八分冪為六十三廣如七長如九其廣起四分為三四分以下弧分皆遞增二廣數亦遞增二其長皆較廣多二則亦遞增二故以弧分二乘減二折半得廣廣恆加二得長也則以次常廣相乘為帶縱平方冪五率乘之為帶縱立方積五除之六除之可得七率而所有之帶縱立方積為弧分自乘又四乘減四五率乘之所成磬折立方積四之一故置弧分自乘又四乘之減四為磬折冪五率乘之為磬折立方積四除之為帶縱立方積又五除之六除之即得七率
