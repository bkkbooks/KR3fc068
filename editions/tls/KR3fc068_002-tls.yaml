body:
  text: 歲曉九九數年十八與同里張彥惟共治算學盡通諸家法又十年居京師識秀水朱筠麓時出所得相質學益進逾年迺成是書又二年復成橢圜求周術一卷斜弧三邊求角補術一卷堆垛求積術一卷余故不通算術而筠麓彥惟二君皆專門學也二君於是書推許甚至爰以冠羣書之首其後成三術亦並以次附焉道光三年冬十月三日基誠序
