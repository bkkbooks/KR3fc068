body:
  text: 數仍以弧求弦矢術變之得其差數始可立為通術也凡弦求弧如前通弧求弦四率六率相求術以六率四乘之五乘之即成帶縱立方積以四率為高弧分減三折半為廣又加三為長解詳前圖若以弦求弧之六率四乘之五乘之亦成帶縱立方積亦以四率為高而廣則如弧分三乘減一折半長則如弧分三乘減一折半又加一弧求弦之帶縱立方積其高為四率以除帶縱立方積即得長廣相乘之冪五分廣為一長為四其冪四七分廣為二長為五其冪十其廣起五分為一五分以下弧分皆遞增二廣長數皆遞增一故以弧分減三折半為廣加三為長弦求弧之帶縱立方積其高亦為四率而六率既不同則體積變而面冪易變若亦以四率為高除帶縱立方積則三分冪為二十廣如四長如五五分冪為五十六廣如七長如八七分冪為一百十廣如十長如十一其廣起三分為四三分以下弧分皆遞增二廣數皆遞增三其長皆較廣多一則易遞增三故
