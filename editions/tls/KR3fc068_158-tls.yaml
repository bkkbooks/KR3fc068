body:
  text: 六率九與應加之六率一為九與一即以一乘之九除之約為六率一少八率一又九之六多十率一又九之一少十二率二十七之十多十四率八十一之五為第三數復以相加則前少之六率一已加足尚少八率一又九之六除前第二數內所多八率三之一實少八率一又三之一當更加八率一又三之一如是屢求至於無盡是以三分通弦為二率矣求諸率應即通弦本數加四率一又加六率一又加八率一又三之一十率以下其數無盡今不具列而得二率三支全數與弧分等野五分以下皆依法遞求亦以遞加之差齊之而比例生矣弦求弧連比例諸率圖
  hash: sha256:f3f25ba886c7733f898672f6de21ef37bee2d185a654e87e01b431fe9910f1af
