body:
  text: 第九術正矢求弧背術曰以正矢倍之為第一數次以半徑為連比例第一率倍正矢為第三率三率自乘依率除之得第五率三除之四除之為第二數次置第二數以三率乘之一率除之得第七率四乘之五除之六除之為第三數次置第三數以三率乘之一率除之得第九率九乘之七除之八除之為第四數次置第四數以三率乘之一率除之得第十一率十六乘之九除之十除之為第五數以諸數相并又為連比例第三率以與一率半徑相乘開平方得第二率及弧背皆杜本
