body:
  text: 得通弧以減半周為所求通弧矢求通弧八乘矢過半徑以上者半徑乘倍矢開方得通弦如通弦術求得通弧倍之為所求通弧正弦求弧背正弦自乘數在半徑自乘數半以上者求得餘弦如正弦法求弧背以減象限得原所求弧背正矢求弧背倍矢過半徑以上者求得餘矢如正矢法求弧背以減象限得原所求弧背仁和范景福有借弧求正餘弦法以半徑一千萬為一率借四十五度正弦及餘弦七七一六八為二率四十五度弧與本弧相減於為較弧如法求其弦矢弦與矢相加減本弧小於借弧求正弦則加求餘弦則減大於借弧求正弦則減求餘
