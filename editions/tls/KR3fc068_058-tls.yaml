body:
  text: 同於乙丁與丁戊之比而乙丁與丁戊之比又同於丁戊與戊己之比則甲乙半徑為連比例一率乙丁為二率丁戊為三率即為二分之倍矢戊己為四率并乙戊與乙丁等己辛與丁庚等辛壬與庚壬等為一分通弦之三倍及三二率而乙壬三分之通弦即為三倍二率少一己戊四率此即割圜法求圜容十八邊形之理自三分以下比例皆出乎此
  hash: sha256:82fb68089b594e950f3357cbecabf92d5c8c3bc30f3b3c323c1ba5ba5157ae77
