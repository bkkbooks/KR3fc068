body:
  text: 為廣加二為長十三率以弧分五乘減二為廣加二為長法亦一貫則以此長廣相乘為帶縱平方冪七率乘之為帶縱立方積七除之八除之可得九率而所有之帶縱立方積為弧分自乘又九乘減四七率乘之所成磬折立方積四之一故置弧分自乘又九乘之減四為磬折冪七率乘之為磬折立方積四除之為帶縱立方積又七除之八除之即得九率
