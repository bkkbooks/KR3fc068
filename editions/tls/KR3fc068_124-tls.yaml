body:
  text: 除之六除之得五乘方錐堆積即為七率以弧分減五折半為根以根與根加五相乘以乘六率為帶縱立方積六除之七除之得六乘方錐堆積即為八率以弧分減六折半為根以根與根加六相乘以乘七率為帶縱立方積七除之八除之得七乘方錐堆積即為九率以弧分減七折半為根以根與根加七相乘以乘八率為帶縱立方積八除之九除之得八乘方錐堆積即為十率以此遞推而億萬率法皆一貫諸率之根既以弧分減一二三四諸數折半為根其所減之數又常與乘數內根所加之數等四率減一而乘數亦為根加一五率減二而乘數亦為根加二以下並同則四率以下弧分常為帶縱立方積羃面之長廣和四率
