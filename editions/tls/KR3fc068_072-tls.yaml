body:
  text: 之甲乙一率除之得兌角四率六少六率五多八率一以減巺角二率得巺兌二率一少四率六多六率五少八率一加倍乙兌二率六少四率八多六率二乙兌同乙坤即同土巺倍乙兌即如乙兌并壬巺得壬乙二率七少四率十四多六率七少八率一為七分之弦依次相求得己房三率八少五率十夕七率四少九率二之一為八分之矢己艮三率十六少五率二十多七率八少九率一為八分之倍矢子乙二率九少四率三時多六率二十七少八率九多十率一為九分之弦庚震三率十二又二之一少五率二十五多七率十七又二之一少九率五多十一率二之一為十分之矢庚坎三率二十五少五率五十多
