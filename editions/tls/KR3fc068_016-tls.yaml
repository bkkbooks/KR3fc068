body:
  text: 第五術弧背求正矢術曰以半徑為連比例第一率弧背為第二率二率自乘一率除之得第三率二除之為第一數寄左次置第一數以三率乘之一率除之得第五率三除之四除之為第二數應減寄右次置第二數以三率乘之一率除之得第七率五除之六除之為第三數應加寄左次置第三數以三率乘之一率除之得第九率七除之八除之為第四數應減寄右第一數第三數相并第二數第四數相并左右相減所餘即正矢第六術
