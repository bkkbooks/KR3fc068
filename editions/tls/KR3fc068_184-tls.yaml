body:
  text: 乙丙丁方形之二十五倍丑仔戊寅小方隅積一其邊丑戊亦一乙甲戊減戊丑折半於庚庚丑為五倍弧分減一折半之數庚辛為五倍弧分減一折半又加一之數庚辛同庚戊庚辛丑辰帶縱平方冪為甲卯丑子寅己磬折冪四之一若同以六率為高則立積亦為四之一矣十率以下數遞進而按位乘除則無異則十率以七倍弧分減一折半為廣加一為長之麵冪與四十九倍弧分自乘方又減一之磬折冪十二率以九倍弧分減一折半為廣加一為長之麵冪與八十一倍弧分自乘方又減一之磬折冪間為四之一至億萬率無不相同故以通弦數作弧分為二率弧分自乘減一二率乘之四
