body:
  text: 四之一若同以五率為高則立積亦為四之一矣如前七率九率相求術以九率七乘之八乘之即成帶縱立方積以七率為高弧分減六折半為廣又加六為長若以矢求弦之九率七乘之八乘之亦成帶縱立方積亦以七率為高而廣則如弧分三乘減二折半長則如弧分三乘減二折半又加二弧求矢之帶縱立方積其高為弧求史之七率以除帶縱立方積則得長廣相乘之冪八分廣一長七其冪七十分廣二長八其冪十六其廣起八分為一八分以下弧分皆遞增二廣長數皆遞增一故以弧分減六折半為廣加六為長矢求弧之帶縱平方積其高為矢求弧之七率以除帶縱立方積則四分冪為三十五廣如五長如七六分冪為八十廣如八長如十八分冪為一百四十三廣如十一長如十三其廣起四分為五四分以下弧分皆遞增二廣數皆遞增三其長較廣亦多二則亦遞增三故以弧分三乘減二折半得廣廣恆加二為長以此類推則十一率以弧分四乘減二折半
