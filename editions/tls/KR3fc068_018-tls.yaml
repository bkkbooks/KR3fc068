body:
  text: 通弦求通弧術曰以通弦為第一數次以半徑為連比例第一率通弦為第二率二率自乘依率除之得第三率次置第一數以三率乘之一率除之得第四率四除之又二除之三除之為第二數次置第二數以三率乘之一率除之得第六率九乘之四除之又四除之五除之為第三數次置第三數以三率乘之一率除之得第八率二十五乘之四除之又六除之七除之為第四數次置第四數以三率乘之一率除之得第十率四十九乘之四除之又八除之九除之為第五數以諸數相并即通弧第七術
