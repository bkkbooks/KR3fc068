body:
  text: 矢求通弧術曰以矢八乘之為第一數次以半徑為連比例第一率八乘矢為第三率三率自乘一率除之得第五率四除之又三除之四除之為第二數次置第二數以三率乘之一率除之得第七率四乘之四除之又五除之六除之為第三數次置第三數以三率乘之一率除之得第九率九乘之四除之又七除之八除之為第四數次置第四數以三率乘之一率除之得第十一率十六乘之四除之又九除之十除之為第五數以諸數相并又為連比例第三率以與第一率半徑相乘開平方得第二率即通弧
