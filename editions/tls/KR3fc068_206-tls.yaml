body:
  text: 乘四率二之五乘之裡可以類推又以第一數乘之則二率自乘再乘為第四率內之四率二率自乘乘第一數內四率三乘之此用同乘法故以三乘併之為第四率內所少之六率各以第一數內之四率乘之第一數內之二率自乘再乘除之則第一數內所少之四率即第二數內所有之四率第一數內四率自乘三乘之二率除之為第二數內所少之六率當以第一數內所多之六率減之方為弦求弧應加之六率而第一數內諸率皆出於二率如以二率齊之則置二率自乘減一二率乘之又以二率自乘減一乘之又三乘之四除之二除之三除之又四除之二除之三除之本以第一數內之四率自乘三乘之二率除之為第一數內所少之六率而求第一數內
