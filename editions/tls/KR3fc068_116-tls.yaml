body:
  text: 如圖舉八率以上為例分為六列第一列一四九十六上圖兩平三角堆相并之數即平方錐堆積平方錐堆如斜置平方形第一層為一第二層為三第三層為五故根一者為積一根二者并一層一二層三為四根三者并一層一二層三三三層為九亦即立方錐堆每層之數也立方錐堆第一層為一第二層為四第三層為九第二列一五十四三十上圖兩立三角堆相并之數即立方錐堆積立方錐堆根一者為積一根二者并一層一二層四為五根三者并一層一二層四三層九為十四亦即三乘方錐堆每層之數也五率以下並同一例至成數十百乘方錐堆積在前圖為兩三角堆行相并之積在此則為方錐堆之積其根數與上所求三角形之根相同其積數即弦矢諸率之率
