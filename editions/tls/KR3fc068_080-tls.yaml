body:
  text: 三分則弦為二率三故弧求弦以弧為二率弦求弧以弦為二率弧求矢以弧為二率而求三率為矢矢求弧以三率求二率而為弧也首率常為多以下皆多少相閒弦則二率幾少圜率幾多六率幾少八率幾矢則三率幾少五率幾多七率幾多九率幾以下多少號常相閒故弧求弦矢所得數奇數常加第一第三第五諸數相并恆加耦數常減第二第四第六諸數相并恆減亦以次相閒至弦矢求弧則弦矢必少於弧故四率五率在彼為減者在此為加諸率相乘一率除之率皆遞降多少號之數既常相閒則首位恒多而次位恒少當求次位以相加然乘除降位後則以次位為首位固變為多而次位復為少如是遞降少數恒大多數恆小故有加而無減也在弦則為幾二率少幾四率又少幾六率又少幾八率以
