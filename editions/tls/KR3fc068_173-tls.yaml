body:
  text: 以弧分三乘減一折半則得廣廣恆加一得長則以此長廣相乘為帶縱平方冪四率乘之為帶縱立方積四除之五除之可得六率而所有之帶縱立方積為弧分字乘又九乘減一四率乘之所成磬折立方積四之一故置弧分自乘又九乘之減一為磬折冪四率乘之得磬折立方積四除之為帶縱立方積又四除之五除之即得六率
