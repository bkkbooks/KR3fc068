body:
  text: 錐堆積而所得之三率本為根乘倍根二除之之數則在三率為根者在五率為根加一再三率為倍根者在五率為倍根加二以三率求五率是巳有根加一倍根加二諸乘數又有二為除數故惟以五率支根與根加二相乘又以三率乘之變為帶縱立方積而除數亦少一二除也以弧分減三折半為根以根與根加三相乘以乘四率為帶縱立方積四除之五除之得四乘方錐堆積即為六率本當以根與根加一相乘根加二再乘根加三三乘倍根加三四乘為帶縱四乘方積二除之三除之四除之五除之得四乘方錐堆積而所得之四率本為根與根加一相乘倍根加一再乘二除之三除之之數則在四率為根者在六率為根加一在四率為根加一者在六率為根加二在四率為倍根加一者在六率為倍根加三以四率求六率是巳有根加一根加二倍根加三諸乘數又有二除三除數故惟以六率之根與根加三相乘又以四率乘之變為帶縱立方積而除數亦少一二除又少一三除七率以下省算理同可以類推以弧分減四折半為根以根與根加四相乘以乘五率為帶縱立方積五
