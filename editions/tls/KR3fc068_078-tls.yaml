body:
  text: 十二少九率六百六十多十一率三百五十二少十三率一百有四多十五率十六少十七率一為十六分之倍矢酉乙二率十七少四率二百有四多六率七百十四少八率一千一百二十二多十率九百三十五少十二率四百四十二多十四率二百有四多六率七百十多十八率一為十七分之弦如是至億萬分則弦與弧合而求弧如求弦亦用弧如用弦一弧之數即眾弦之合數矣在弧則弦常得奇數一分三分五分至億萬分矢常得耦數二分四分六分至億萬分在連比例諸率則弦常得耦數二率四率六率至億萬率矢常得奇數三率五率七率至億萬率故弧弦相求皆用耦率弧矢相求皆用奇率也弦之二率常與弧分等一分則弦為二率一
  hash: sha256:59ed143beffe03a13512d789f53dcbd486120a3b755d54a300ea5c000458efe0
