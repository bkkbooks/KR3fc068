body:
  text: 五率二之一水乙斗三角為兩等邊三角形乙心為其中垂線故水心得水斗之半與上丙乙火三角形及下坤乙兌巺乙離箕乙參柳乙危壁乙婁昴乙牛諸三角形並同加丁水三率一丁水同丙火得丁心三率二少五率二之一為四分之矢若置丁水三率一倍之得三率二金斗同丁水倍丁水即如丁水并金斗加水斗三率二少五率一得丁金三率四少五率一為四分之倍矢減金斗三率一得丁斗三率三少五率一丙乙二率乘之甲乙一率除之丁亢與戊坤平行則斗丁亢角同戊甲丁角亦即同丙甲乙角為同式三角形與上火丙木三角形即下兌戊角離己尾參庚張危辛室婁壬冑牛癸女諸三角形並同得斗亢四率三少六率一以減坤亢二率坤亢同戊丁即同丙乙與上水木線及下巺角箕尾柳張壁室昴冑井女諸線並同得坤斗二率一少四率三多六率一凡相減無對多少互變加倍乙斗二率四少四率二
