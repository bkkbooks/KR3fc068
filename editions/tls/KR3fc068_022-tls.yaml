body:
  text: 第八術正弦求弧背術曰以正弦為第一數次以半徑為連比例第一率正弦為第二率二率自乘一率除之得第三率次置第一數以三率乘之一率除之得第四率二除之三除之為第二數次置第二數以三率乘之一率除之得第六率九乘之四除之五除之為第三數次置第三數以三率乘之一率除之得第八率二十五乘之六除之七除之為第四數次置第四數以三率乘之一率除之得第十率四十九乘之八除之九除之為第五數以諸數相并即弧背
