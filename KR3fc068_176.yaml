body:
  text: 如圖甲丙為弧分甲乙丙丁為弧分自乘正方形甲戊為三倍弧分甲卯戊己為三倍弧分自乘正方形即甲乙丙丁方形之九倍丑子戊寅小方隅積一其邊丑戊亦一以甲戊減戊丑折半於庚庚丑為三倍弧分減一折半之數庚辛為三倍弧分減一折半又加一之數庚辛同庚戊庚辛丑辰帶縱平方冪為甲卯丑子寅己磬折冪四之一若同以四率為高則立積亦為四之一矣移積之理同前不復詳釋如前六率八率相求術以八率六成之七乘之即成帶縱立方積以六率為高弧分減五折半為廣又加五為長若以弦求弧之八率六乘之七乘之一成帶縱立方
  hash: sha256:d7ddb585ebeb0006916663f2b0cce91104654861511343a050a00ea2e8737683
