body:
  text: 除之三除之四除之即第二數內所少之七率復以二率自乘以二率自乘減四乘之又以二率自乘減十六乘之四除之二除之又四除之三除之四除之又四除之五除之六除之即第一數內七率亦當相減今以兩數亦為立方積則一以二率自乘數為廣二率自乘數少四為高二倍二率自乘數少八為長一以二率自乘數為廣二率自乘數少四為高二率自乘數少十六為長齊高廣既同而除數亦異亦變其長使除數相同故置前形之長二倍二率自乘數少八以除數相異之五與六迭乘之三與四迭除之得五倍二率自乘數少二十為長以後形之長二率自乘數少十六減之得四倍
