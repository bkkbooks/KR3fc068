body:
  text: 術並見陳氏書中范氏所作其暗合歟余以垛積釋比例而三角及方錐堆三乘以下舊無其術近讀元朱世傑四元玉鑑茭草形段果垛疊藏諸問乃知遞乘遞除之術近古所有而遠西之士尚能守其遺法有足珍者爰并記之道光建元六月朔日董祐誠
