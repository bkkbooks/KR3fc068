body:
  text: 如圖舉四分之矢九率以上為例為矢求通弧諸率之所自出矢首位三率雖同而實數則少當遞求諸率以相加而得三率之全數四分之倍矢為三率四少五率一即用為三率如法以求諸率法與前所列三分通弦同惟用數互異不復贅列是以四分支倍矢為三率以求諸率應即倍矢本數加五率一又加七率二之一又加九率十六之五十一率以下數亦無盡而得以半弧分為二率所求之三率也六分以下亦依次遞求並以遞加之差齊而比例生矣
  hash: sha256:99b58aa576abf7c0a8c5d5340f1a587f86f7dcc09c997bf925f3a0821b1c3fc0
