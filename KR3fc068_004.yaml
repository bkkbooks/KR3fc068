body:
  text: 割圜連比例術圖解序董方立遺書一原郭守敬授時草用天原術求弧矢徑一圍三猶仍舊率西人以六宗三要二簡術求八線理密數繁凡遇布算皆資於表梅文慕公赤水遺珍載西士杜德美圜徑求周諸術語焉不詳罕通其故嘗遇更創通法使弦矢與弧可以徑求覃精纍年迄無所得己卯春秀水朱先生鴻以杜氏九術全本相示蓋海寧張先生豸冠所寫者九術以外別無圖說聞陳氏際新嘗為之注為某氏所祕書已不傳乃反覆尋繹究其立法之原即圜容十八觚之術引伸類長求其絫積實兼差分之列衰商功之堆垛而會通以盡句股之變周髀經日圜出於方
  hash: sha256:bbbe8fd8281c18a6f6aa93ca0b0105657a411df9c3fc03b91c485baee2139f55
