body:
  text: 內少一四率應加一四率乃即以通弦二率三少四率一為二率二率字成一率除之為三率九少五率六多七率一即為三率通弦二率三少四率一為二率乘之一率除之為四率二十七少六率二十七多八率九少十率一圖止八率以上首位四率二十七與應加之四率一為二十七與一即以一乘之二十七除之約為四率一少六率一多八率三之一少十率二十七之一為第二數以之相加則前少之四率已加足而次位尚少六率一乃復置第二數以三率九少五率六多七率一為三率乘之一率除之為六率九少八率十五多十率十少十二率三又三之一多十四率九之五十四率以下不具列首位之
  hash: sha256:5e161a8833682ca36ff0c75300d2986659cc73aa2b17f3c7c7c8780f9d59c14c
