body:
  text: 於一而以次漸增如前圖弧分起一乙丙則二率亦起一乙丙自二率一遞求諸線弧分增一分則連比例增一率一分之弦有二率二分之矢有三率三分之弦有四率四分之弦有五率率數亦以一遞加遞積凡弦皆以中一分加左右兩端得弦矢皆以中一分加上下兩端得倍矢三分則倍火乙即如右端火乙加左端戊水再加中一分火水得戊乙為三分之弦四分則倍丁水即如上端丁水加下端斗金再加中一分水斗得丁金為四分之倍矢而倍矢之中一分出於弦右端丙火出於火乙水斗出於斗乙弦之中一分出於矢上端水火出於丙火坤斗出於丁斗故數常蟬聯半徑一率常為一弦中一分之二率亦常為一如遞加根數水火坤斗巺兌箕離二率皆為一左右一端之二率為一二三四如遞加數火乙二率一斗乙二率一兌乙二率三離乙二率四倍矢中一分之三率同丙火
  hash: sha256:38068b30f0daafbac9df404d73441dafb689f7d0991ccbd8f22c978e839575b6
