body:
  text: 除之又二除之三除之為四率弧分自乘九程之減一四率乘之四除之又四除之五除之為六率弧分自乘二十五乘之減一六率乘之四除之又六除之七除之為八率以此遞求其乘數皆奇數按位自乘數其減數皆一而除數則與弧求弦同其一率遞除降位及直以弧分自乘之三率乘之不復減一其理亦同既得諸率以之相加即得二率全數而二率全數及弧分全數故即為通弧之數正弦求弧背則比例固同而以正弦作弧分其自乘積與通弦作弧分自乘之積亦為一與四通弦加正弦一倍以求諸率當加一四乘今不復加亦以少一四除代之至圜徑求周圜內六分之一通弦長與半徑
