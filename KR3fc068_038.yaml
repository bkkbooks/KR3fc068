body:
  text: 弦則加為三率得四率以與借弧之弦相加減本弧小於借弧求正弦則減求餘弦則加大於借弧求正弦則加求餘弦則減即得本弧正餘弦有借弦求弧法正弦過半徑十分之三至十分之六借三十度正弦五餘弦八六六二五四用之過半徑十分之六至十分之八借四十五度正餘弦用之過半徑十分之八至十分之九借六十度正弦八六六二五四餘弦五用之先以本弧正弦求得本弧餘弦次以本弧正餘弦與借弧正餘弦各相減得正弦較為股餘弦較為句各自乘相并開方得弦為較弧通弦如法求得通弧即較胡與
