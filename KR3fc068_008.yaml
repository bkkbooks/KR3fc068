body:
  text: 陽湖董祐誠第一術圜徑求周術曰以徑三乘之為第一數次置第一數四除之又二除之三除之為第二數次置第二數九乘之四除之又四除之五除之為第三數次置第三數二十五乘之四除之又六除之七除之為第四數次置第四數四十九乘之四除之又八除之九除之為第五數次置第五數八十一乘之四除之又十除之十一除之為第六數若以千萬為圜徑則求至第十一數并之得三千一百四
