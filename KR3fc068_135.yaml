body:
  text: 如圖甲丙為弧分甲乙丙丁為弧分自乘正方形丑子丙申小方隅積一其邊丑丙亦為一庚丑為甲丑之半即根數本以弧分減一折半為根數故甲丙減丑丙折半於庚為庚丑庚壬為根加一以庚丑為廣庚壬為長二率為高成帶縱立方積本以根與根加一相乘倍根加一即二率再乘為帶縱立方積其面冪為庚壬丑癸帶縱平方形為甲乙丑子申丁磬折形面冪四之一甲乙丙丁方積內減去丑子丙申隅積一即成甲乙丑子申丁磬折形移子癸申己形補戊乙壬辛形即與庚壬丑癸形等而甲戊更壬形己壬丁辛形皆與庚壬丑癸形相等故為四之一若同以甲寅二率為高成寅甲乙丁未午申子丑卯磬折立方形則兩立積相較亦為四之一矣凡求五率所得之帶縱立方積以根數為廣根數加二
